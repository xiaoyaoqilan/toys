name: Daily Finance Signal

on:
  schedule:
    # 每天北京时间9点执行
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-signal:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install -r requirements.txt
    
    - name: 配置环境变量
      run: |
        echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
        echo "SERVERCHAN_KEY=${{ secrets.SERVERCHAN_KEY }}" >> .env
    
    - name: 运行信号系统
      run: |
        python pipeline/daily_signal.py
    
    - name: 保存日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: signal-log-${{ github.run_id }}
        path: |
          data/
          *.log
